services:
  frontend:
    build: ./frontend
    container_name: app_frontend
    ports:
      - "8080:80"
    networks:
      - rede_front
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: app_backend
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=senha_banco
      - DB_HOST=db
      - DB_NAME=catalogo_db
    networks:
      - rede_front
      - rede_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: app_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=senha_banco
      - POSTGRES_DB=catalogo_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rede_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:

networks:
  rede_front:
    driver: bridge
  rede_db:
    internal: true
