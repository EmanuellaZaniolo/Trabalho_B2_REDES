<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Recomendações</title>
    
    <!-- Importando a fonte Poppins para um visual mais Aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: url('fundoLista.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #4a4a4a;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        /* Efeito de vidro (Glassmorphism) para suavizar o fundo e destacar a paleta */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px); /* Desfoque aesthetic */
            z-index: -1;
        }
        
        h1 {
            text-align: center;
            color: #FF5D5D; /* Cor mais forte da paleta */
            text-shadow: 2px 2px 0px #FFE3A9; /* Sombra com o amarelo pastel */
            font-size: 2.8em;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.85); /* Fundo branco translúcido */
            padding: 30px;
            border-radius: 20px; /* Bordas bem arredondadas */
            box-shadow: 0 10px 30px rgba(255, 93, 93, 0.15); /* Sombra suave vermelha */
            margin-bottom: 40px;
            border: 2px solid #FFC3C3; /* Borda rosa claro */
            backdrop-filter: blur(10px);
        }

        .form-container h3 {
            margin-top: 0;
            color: #FF8C8C; /* Rosa médio */
            font-weight: 600;
            text-align: center;
            font-size: 1.5em;
        }

        label {
            font-weight: 600;
            color: #FF5D5D;
            font-size: 0.95em;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0 25px 0;
            border: 2px solid #FFE3A9; /* Borda amarela pastel */
            border-radius: 12px;
            box-sizing: border-box;
            background-color: #fff;
            color: #555;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #FF8C8C;
            box-shadow: 0 0 10px rgba(255, 140, 140, 0.2);
        }

        button {
            width: 100%;
            /* Degradê usando as duas cores mais fortes */
            background: linear-gradient(135deg, #FF8C8C, #FF5D5D);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 18px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 93, 93, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 93, 93, 0.4);
        }

        .recomendacao-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-left: 8px solid #FF5D5D; /* Destaque lateral */
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 8px 25px rgba(255, 195, 195, 0.4);
            border-top: 1px solid #FFC3C3;
            border-right: 1px solid #FFC3C3;
            border-bottom: 1px solid #FFC3C3;
            transition: transform 0.2s;
        }

        .recomendacao-card:hover {
            transform: scale(1.02); /* Leve animação ao passar o mouse */
        }

        .recomendacao-titulo {
            font-size: 1.6em;
            font-weight: 600;
            color: #FF5D5D;
            margin-bottom: 8px;
        }

        .recomendacao-categoria {
            font-size: 0.85em;
            color: #FF5D5D;
            background-color: #FFE3A9; /* Tag amarela */
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px; /* Estilo pílula */
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .recomendacao-observacao {
            background: rgba(255, 195, 195, 0.3); /* Rosa bem clarinho com transparência */
            padding: 15px;
            border-radius: 12px;
            font-size: 0.95em;
            color: #4a4a4a;
            border-left: 4px solid #FF8C8C;
        }
    </style>
</head>
<body>

    <h1>Catálogo de Recomendações</h1>

    <div class="form-container">
        <h3>Adicionar Nova Recomendação</h3>
        <form id="formRecomendacao">
            <label for="titulo">Título da Obra:</label>
            <input type="text" id="titulo" placeholder="Ex: Forrest Gump - Frank ocean" required>

            <label for="categoria">Categoria:</label>
            <select id="categoria" required>
                <option value="🎵 Música">🎵 Música</option>
                <option value="🎬 Filme">🎬 Filme</option>
                <option value="📺 Série">📺 Série</option>
                <option value="📚 Livro">📚 Livro</option>
                <option value="🎮 Jogo">🎮 Jogo</option>
                <option value="🎧 Podcast">🎧 Podcast</option>
            </select>

            <label for="observacao">Observações:</label>
            <textarea id="observacao" rows="3" placeholder="Amo essa música! minha fav " required></textarea>

            <button type="submit">Adicionar ao Catálogo</button>
        </form>
    </div>

    <div id="listaRecomendacoes">
        <!-- As recomendações aparecerão aqui -->
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/recomendacoes';

        async function carregarRecomendacoes() {
            try {
                const response = await fetch(API_URL);
                const recomendacoes = await response.json();
                
                const lista = document.getElementById('listaRecomendacoes');
                lista.innerHTML = ''; 
                
                recomendacoes.reverse().forEach(rec => {
                    const card = document.createElement('div');
                    card.className = 'recomendacao-card';
                    card.innerHTML = `
                        <div class="recomendacao-titulo">${rec.titulo}</div>
                        <div class="recomendacao-categoria">${rec.categoria}</div>
                        <div class="recomendacao-observacao"><strong>Comentário:</strong><br> ${rec.observacao}</div>
                    `;
                    lista.appendChild(card);
                });
            } catch (error) {
                console.error('Erro ao carregar recomendações:', error);
            }
        }

        document.getElementById('formRecomendacao').addEventListener('submit', async function(e) {
            e.preventDefault();

            const titulo = document.getElementById('titulo').value;
            const categoria = document.getElementById('categoria').value;
            const observacao = document.getElementById('observacao').value;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ titulo, categoria, observacao })
                });

                document.getElementById('formRecomendacao').reset();
                carregarRecomendacoes();
            } catch (error) {
                console.error('Erro ao adicionar recomendação:', error);
            }
        });

        carregarRecomendacoes();
    </script>
</body>
</html>
