<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Recomendações 🌟</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Usa a imagem original de fundo e a fixa na tela */
            background: url('fundoLista.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ecf0f1;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 2.5em;
            margin-bottom: 30px;
        }

        /* Fundo escuro semi-transparente para dar destaque ao conteúdo sem esconder a imagem */
        .form-container {
            background: rgba(30, 30, 30, 0.85);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .form-container h3 {
            margin-top: 0;
            color: #3498db;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        label {
            font-weight: bold;
            color: #bdc3c7;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px 0;
            border: 1px solid #555;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 1em;
        }

        /* Corrige a cor das opções no select para não ficarem invisíveis */
        select option {
            background-color: #2c3e50; 
            color: #fff;
        }

        button {
            width: 100%;
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: background-color 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button:hover {
            background-color: #c0392b;
        }

        .recomendacao-card {
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-left: 5px solid #e74c3c;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .recomendacao-titulo {
            font-size: 1.5em;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .recomendacao-categoria {
            font-size: 0.9em;
            color: #bdc3c7;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .recomendacao-observacao {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 6px;
            font-style: italic;
            color: #ecf0f1;
            border-left: 3px solid #3498db;
        }
    </style>
</head>
<body>

    <h1>💡 Catálogo de Recomendações 🍿</h1>

    <div class="form-container">
        <h3>Adicionar Nova Recomendação</h3>
        <form id="formRecomendacao">
            <label for="titulo">Título da Obra (Filme, Livro, Música, etc.):</label>
            <input type="text" id="titulo" placeholder="Ex: O Senhor dos Anéis 💍" required>

            <label for="categoria">Categoria:</label>
            <select id="categoria" required>
                <option value="🎵 Música">🎵 Música</option>
                <option value="🎬 Filme">🎬 Filme</option>
                <option value="📺 Série">📺 Série</option>
                <option value="📚 Livro">📚 Livro</option>
                <option value="🎮 Jogo">🎮 Jogo</option>
                <option value="🎧 Podcast">🎧 Podcast</option>
            </select>

            <label for="observacao">Observações:</label>
            <textarea id="observacao" rows="3" placeholder="Insira suas observações sobre esta recomendação..." required></textarea>

            <button type="submit">Adicionar ao Catálogo 🚀</button>
        </form>
    </div>

    <div id="listaRecomendacoes">
        <!-- As recomendações aparecerão aqui -->
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/recomendacoes';

        // Função para carregar as recomendações do backend
        async function carregarRecomendacoes() {
            try {
                const response = await fetch(API_URL);
                const recomendacoes = await response.json();
                
                const lista = document.getElementById('listaRecomendacoes');
                lista.innerHTML = ''; // Limpa a lista antes de carregar
                
                recomendacoes.reverse().forEach(rec => {
                    const card = document.createElement('div');
                    card.className = 'recomendacao-card';
                    card.innerHTML = `
                        <div class="recomendacao-titulo">${rec.titulo}</div>
                        <div class="recomendacao-categoria">${rec.categoria}</div>
                        <div class="recomendacao-observacao"><strong>📌 Observações:</strong> ${rec.observacao}</div>
                    `;
                    lista.appendChild(card);
                });
            } catch (error) {
                console.error('Erro ao carregar recomendações:', error);
            }
        }

        // Função para adicionar uma nova recomendação
        document.getElementById('formRecomendacao').addEventListener('submit', async function(e) {
            e.preventDefault();

            const titulo = document.getElementById('titulo').value;
            const categoria = document.getElementById('categoria').value;
            const observacao = document.getElementById('observacao').value;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ titulo, categoria, observacao })
                });

                // Limpa o formulário e recarrega a lista
                document.getElementById('formRecomendacao').reset();
                carregarRecomendacoes();
            } catch (error) {
                console.error('Erro ao adicionar recomendação:', error);
            }
        });

        // Carrega a lista ao abrir a página
        carregarRecomendacoes();
    </script>
</body>
</html>
