<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Recomendações</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background: #FEC288 url('./fundoLista.jpg') no-repeat center center fixed;
            background-size: cover;

            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #FA5C5C;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.9);
            font-size: 2.5em;
            margin-bottom: 30px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            border: 3px solid #FD8A6B;
        }

        .form-container h3 {
            margin-top: 0;
            color: #FA5C5C;
        }

        label {
            font-weight: bold;
            color: #FD8A6B;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px 0;
            border: 2px solid #FEC288;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fff;
            color: #333;
            font-size: 1em;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #FA5C5C;
        }

        button {
            width: 100%;
            background-color: #FA5C5C;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: background-color 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: #FD8A6B;
        }

        .recomendacao-card {
            background: #FBEF76;
            padding: 20px;
            border-left: 6px solid #FA5C5C;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .recomendacao-titulo {
            font-size: 1.5em;
            font-weight: bold;
            color: #FA5C5C;
            margin-bottom: 5px;
        }

        .recomendacao-categoria {
            font-size: 0.9em;
            color: #FD8A6B;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .recomendacao-observacao {
            background: rgba(254, 194, 136, 0.4);
            padding: 15px;
            border-radius: 6px;
            font-style: italic;
            color: #333;
            border-left: 3px solid #FD8A6B;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .card-actions button {
            padding: 8px;
            font-size: 14px;
        }

        .btn-editar {
            background-color: #4A90D9;
        }
        .btn-editar:hover {
            background-color: #6FAEE8;
        }

        .btn-excluir {
            background-color: #B0453A;
        }
        .btn-excluir:hover {
            background-color: #D45C4F;
        }

        .card-edit-form input,
        .card-edit-form select,
        .card-edit-form textarea {
            margin: 6px 0 12px 0;
        }
    </style>
</head>
<body>

    <h1>Catálogo de Recomendações</h1>

    <div class="form-container">
        <h3>Adicionar Nova Recomendação</h3>
        <form id="formRecomendacao">
            <label for="titulo">Título da Obra (Filme, Livro, Música, etc.):</label>
            <input type="text" id="titulo" placeholder="Ex: Forrest Gump - Frank Ocean" required>

            <label for="categoria">Categoria:</label>
            <select id="categoria" required>
                <option value="🎵 Música">🎵 Música</option>
                <option value="🎬 Filme">🎬 Filme</option>
                <option value="📺 Série">📺 Série</option>
                <option value="📚 Livro">📚 Livro</option>
                <option value="🎮 Jogo">🎮 Jogo</option>
                <option value="🎧 Podcast">🎧 Podcast</option>
            </select>

            <label for="observacao">Observações:</label>
            <textarea id="observacao" rows="3" placeholder="Amo essa musica mds" required></textarea>

            <button type="submit">Adicionar ao Catálogo</button>
        </form>
    </div>

    <div id="listaRecomendacoes">
        <!-- As recomendações aparecerão aqui -->
    </div>

    <script>

        // URL relativa: o Nginx do próprio frontend faz o proxy para o
        // container do backend através da rede interna do Docker.
        const API_URL = '/api/recomendacoes';

        async function carregarRecomendacoes() {
            try {
                const response = await fetch(API_URL);
                const recomendacoes = await response.json();

                const lista = document.getElementById('listaRecomendacoes');
                lista.innerHTML = '';

                recomendacoes.reverse().forEach(rec => {
                    const card = document.createElement('div');
                    card.className = 'recomendacao-card';
                    card.dataset.id = rec.id;
                    renderView(card, rec);
                    lista.appendChild(card);
                });
            } catch (error) {
                console.error('Erro ao carregar recomendações:', error);
            }
        }

        function renderView(card, rec) {
            card.innerHTML = `
                <div class="recomendacao-titulo">${rec.titulo}</div>
                <div class="recomendacao-categoria">${rec.categoria}</div>
                <div class="recomendacao-observacao"><strong>Observações:</strong> ${rec.observacao}</div>
                <div class="card-actions">
                    <button type="button" class="btn-editar">Editar</button>
                    <button type="button" class="btn-excluir">Excluir</button>
                </div>
            `;

            card.querySelector('.btn-editar').addEventListener('click', () => renderEdit(card, rec));
            card.querySelector('.btn-excluir').addEventListener('click', () => excluirRecomendacao(rec.id));
        }

        function renderEdit(card, rec) {
            card.innerHTML = `
                <form class="card-edit-form">
                    <label>Título:</label>
                    <input type="text" class="edit-titulo" value="${rec.titulo}" required>

                    <label>Categoria:</label>
                    <select class="edit-categoria" required>
                        <option value="🎵 Música">🎵 Música</option>
                        <option value="🎬 Filme">🎬 Filme</option>
                        <option value="📺 Série">📺 Série</option>
                        <option value="📚 Livro">📚 Livro</option>
                        <option value="🎮 Jogo">🎮 Jogo</option>
                        <option value="🎧 Podcast">🎧 Podcast</option>
                    </select>

                    <label>Observações:</label>
                    <textarea class="edit-observacao" rows="3" required>${rec.observacao}</textarea>

                    <div class="card-actions">
                        <button type="submit">Salvar</button>
                        <button type="button" class="btn-cancelar">Cancelar</button>
                    </div>
                </form>
            `;

            card.querySelector('.edit-categoria').value = rec.categoria;

            card.querySelector('.card-edit-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const atualizado = {
                    titulo: card.querySelector('.edit-titulo').value,
                    categoria: card.querySelector('.edit-categoria').value,
                    observacao: card.querySelector('.edit-observacao').value,
                };
                await atualizarRecomendacao(rec.id, atualizado);
            });

            card.querySelector('.btn-cancelar').addEventListener('click', () => renderView(card, rec));
        }

        async function atualizarRecomendacao(id, dados) {
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                carregarRecomendacoes();
            } catch (error) {
                console.error('Erro ao atualizar recomendação:', error);
            }
        }

        async function excluirRecomendacao(id) {
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                carregarRecomendacoes();
            } catch (error) {
                console.error('Erro ao excluir recomendação:', error);
            }
        }

        document.getElementById('formRecomendacao').addEventListener('submit', async function(e) {
            e.preventDefault();

            const titulo = document.getElementById('titulo').value;
            const categoria = document.getElementById('categoria').value;
            const observacao = document.getElementById('observacao').value;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, categoria, observacao })
                });

                document.getElementById('formRecomendacao').reset();
                carregarRecomendacoes();
            } catch (error) {
                console.error('Erro ao adicionar recomendação:', error);
            }
        });

        carregarRecomendacoes();
    </script>
</body>
</html>
