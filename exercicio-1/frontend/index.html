<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Recomendações</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(180deg, #FEC288 0%, #FBEF76 50%, #FEC288 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }

        /* Overlay com imagem de fundo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('./fundoLista.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: cover;
            opacity: 0.12;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(250, 92, 92, 0.15);
            border-top: 5px solid #FA5C5C;
            border-bottom: 5px solid #FD8A6B;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #FA5C5C;
            font-size: 3em;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #FD8A6B;
            font-size: 1.2em;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(253, 138, 107, 0.2);
            border: 3px solid #FD8A6B;
            border-top: 6px solid #FA5C5C;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .form-container h3 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #FA5C5C;
            font-family: 'Playfair Display', serif;
            font-size: 1.7em;
            font-weight: 700;
        }

        label {
            font-weight: 600;
            color: #FD8A6B;
            display: block;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 2px solid #FEC288;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #fff;
            color: #333;
            font-size: 1em;
            font-family: 'Lato', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #FA5C5C;
            box-shadow: 0 0 0 3px rgba(250, 92, 92, 0.1);
            background-color: #fffbf0;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #FA5C5C 0%, #FD8A6B 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.05em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(250, 92, 92, 0.3);
            font-family: 'Lato', sans-serif;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(250, 92, 92, 0.4);
            background: linear-gradient(135deg, #FD8A6B 0%, #FA5C5C 100%);
        }

        button:active {
            transform: translateY(0);
        }

        .lista-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .recomendacao-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 22px;
            border-left: 6px solid #FA5C5C;
            border-radius: 10px;
            box-shadow: 0 6px 16px rgba(250, 92, 92, 0.2);
            transition: all 0.3s ease;
            border-right: 3px solid #FD8A6B;
            border-top: 2px solid #FEC288;
        }

        .recomendacao-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 22px rgba(250, 92, 92, 0.3);
            border-left-color: #FEC288;
            border-right-color: #FA5C5C;
        }

        .recomendacao-titulo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5em;
            font-weight: 700;
            color: #FA5C5C;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .recomendacao-categoria {
            font-size: 0.85em;
            color: #FD8A6B;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .recomendacao-observacao {
            background: rgba(254, 194, 136, 0.15);
            padding: 14px;
            border-radius: 6px;
            font-style: italic;
            color: #333;
            border-left: 3px solid #FD8A6B;
            line-height: 1.5;
            font-size: 0.95em;
        }

        .recomendacao-observacao strong {
            color: #FA5C5C;
            font-style: normal;
            font-weight: 700;
        }

        /* Responsivo */
        @media (max-width: 1024px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }

            .form-container {
                position: static;
                top: auto;
            }

            h1 {
                font-size: 2.5em;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .header {
                padding: 20px;
                margin-bottom: 30px;
            }

            .form-container {
                padding: 20px;
            }

            .recomendacao-titulo {
                font-size: 1.3em;
            }

            .subtitle {
                font-size: 1em;
            }

            .content-wrapper {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Catálogo de Recomendações</h1>
            <p class="subtitle">Suas obras favoritas em um só lugar</p>
        </div>

        <div class="content-wrapper">
            <div class="form-container">
                <h3>Adicionar Nova Recomendação</h3>
                <form id="formRecomendacao">
                    <label for="titulo">Título da Obra:</label>
                    <input type="text" id="titulo" placeholder="Ex: Forrest Gump - Frank Ocean" required>

                    <label for="categoria">Categoria:</label>
                    <select id="categoria" required>
                        <option value="🎵 Música">🎵 Música</option>
                        <option value="🎬 Filme">🎬 Filme</option>
                        <option value="📺 Série">📺 Série</option>
                        <option value="📚 Livro">📚 Livro</option>
                        <option value="🎮 Jogo">🎮 Jogo</option>
                        <option value="🎧 Podcast">🎧 Podcast</option>
                    </select>

                    <label for="observacao">Observações:</label>
                    <textarea id="observacao" placeholder="Compartilhe suas impressões..." required></textarea>

                    <button type="submit">Adicionar ao Catálogo</button>
                </form>
            </div>

            <div id="listaRecomendacoes" class="lista-container">
                <!-- As recomendações aparecerão aqui -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/recomendacoes'; 

        async function carregarRecomendacoes() {
            try {
                const response = await fetch(API_URL);
                const recomendacoes = await response.json();
                
                const lista = document.getElementById('listaRecomendacoes');
                lista.innerHTML = ''; 
                
                recomendacoes.reverse().forEach(rec => {
                    const card = document.createElement('div');
                    card.className = 'recomendacao-card';
                    card.innerHTML = `
                        <div class="recomendacao-titulo">${rec.titulo}</div>
                        <div class="recomendacao-categoria">${rec.categoria}</div>
                        <div class="recomendacao-observacao"><strong>Observações:</strong> ${rec.observacao}</div>
                    `;
                    lista.appendChild(card);
                });
            } catch (error) {
                console.error('Erro ao carregar recomendações:', error);
            }
        }

        document.getElementById('formRecomendacao').addEventListener('submit', async function(e) {
            e.preventDefault();

            const titulo = document.getElementById('titulo').value;
            const categoria = document.getElementById('categoria').value;
            const observacao = document.getElementById('observacao').value;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, categoria, observacao })
                });

                document.getElementById('formRecomendacao').reset();
                carregarRecomendacoes();
            } catch (error) {
                console.error('Erro ao adicionar recomendação:', error);
            }
        });

        carregarRecomendacoes();
    </script>
</body>
</html>
