services:
  frontend:
    build: ./frontend
    container_name: catalogo_frontend
    ports:
      - "8080:80"
    networks:
      - rede_front
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: catalogo_backend
    ports:
      - "3000:3000"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=senha_banco_123
      - DB_HOST=db
      - DB_NAME=catalogo_db
    networks:
      - rede_front
      - rede_db
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: catalogo_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=senha_banco_123
      - POSTGRES_DB=catalogo_db
    volumes:
      - db_data_catalogo:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rede_db

volumes:
  db_data_catalogo:

networks:
  rede_front:
    driver: bridge
  rede_db:
    internal: true
